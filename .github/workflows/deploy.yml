name: deploy

on:
  push:
    branches: [main]
    # Skip the post-merge redeploy — and its LAST_DEPLOY re-stamp, which resets
    # the terminal's `uptime` — when a push to main touches only files the site
    # never ships. paths-ignore fails safe: a push that also changes any deployed
    # file still runs, so a real content change can never be skipped (unlike a
    # paths allowlist, which would silently drop a deploy if it drifted from the
    # deploy set). The change was already linted and tested by the pull_request
    # trigger below before it merged.
    #
    # This list must cover EVERY never-shipped file, or a change to one that's
    # missing here (a deps bump, a lint-config tweak, og-image.src.svg) needlessly
    # redeploys and resets `uptime`. tools/check-deploy-assets.mjs binds it to the
    # dev-only classification: every tracked file must be ignored here exactly when
    # it is dev-only, so a shipped file can never be listed (which would skip a
    # real deploy) and a new dev-only file can't be forgotten. Keep the entries in
    # sync with that guard's DEV_ONLY_DIRS / DEV_ONLY_EXTENSIONS / DEV_ONLY_FILES.
    paths-ignore:
      - "**.md"
      - ".claude/**"
      - ".github/**"
      - "e2e/**"
      - "ops/**"
      - "test/**"
      - "tools/**"
      - ".editorconfig"
      - ".git-blame-ignore-revs"
      - ".gitignore"
      - ".markdownlint-cli2.jsonc"
      - ".prettierignore"
      - ".stylelintrc.json"
      - ".tool-versions"
      - "LICENSE"
      - "deploy.sh"
      - "eslint.config.mjs"
      - "lychee.toml"
      - "og-image.src.svg"
      - "package-lock.json"
      - "package.json"
      - "playwright.config.js"
      - "svgo.config.mjs"
      - "validate.sh"
  pull_request:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview changes without writing (rsync --dry-run)"
        type: boolean
        default: false

# Least privilege: neither job needs to write to the repo. validate only reads
# the checkout to lint and test; deploy authenticates to the host over SSH, not
# with the GITHUB_TOKEN. Setting contents: read drops every other default scope.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      # Nu Html Checker (current release) over the markup, the stylesheet and the
      # SVG favicon, mirroring `validate.sh`. We download the jar rather than use
      # a packaged wrapper: wrappers ship an older bundled vnu that rejects valid
      # modern features (theme-color `media`, the `color-scheme` CSS property).
      # Selecting files by extension keeps vnu away from the binary PNGs.
      - name: Validate HTML, CSS and SVG
        run: |
          curl -sSfL -o "$RUNNER_TEMP/vnu.jar" \
            https://github.com/validator/validator/releases/download/latest/vnu.jar
          # Filter benign infos: the void-element trailing slash (Prettier
          # house style), the CSP meta check (a file:// false positive where
          # script-src 'self' can't match the same-origin js/ modules; served
          # over https it allows them; verified in-browser, no violations), and
          # CSS "field-sizing" (vnu doesn't recognise this modern property yet;
          # the @supports guard in style.css makes it safe to use).
          find . \( -path ./.git -o -path ./node_modules \) -prune -o \
            \( -name '*.html' -o -name '*.css' -o -name '*.svg' \) \
            -exec java -jar "$RUNNER_TEMP/vnu.jar" \
              --filterpattern '.*(Trailing slash on void elements|Content Security Policy|field-sizing).*' \
              --also-check-css --also-check-svg {} +

      # vnu only covers the SVG XML; sitemap.xml is otherwise unchecked. Plain
      # --noout is well-formedness only (no network). xmllint ships in
      # libxml2-utils, which isn't on the runner by default. Mirrors validate.sh.
      - name: Validate XML well-formedness
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils
          xmllint --noout sitemap.xml

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: npm

      - name: Install npm tooling
        run: npm ci

      # Read the pins with an exact first-field match (mirroring validate.sh's
      # tool_version helper) and `exit` after the first hit, so a malformed or
      # hostile .tool-versions can neither prefix-match the wrong tool nor emit
      # extra GITHUB_OUTPUT lines. The values still flow into later steps only
      # through env vars (never interpolated into a run: script), so a value
      # can't be parsed as shell.
      - name: Read tool versions
        id: versions
        run: |
          {
            echo "shfmt=$(awk '$1 == "shfmt" { print $2; exit }' .tool-versions)"
            echo "actionlint=$(awk '$1 == "actionlint" { print $2; exit }' .tool-versions)"
          } >> "$GITHUB_OUTPUT"

      # Pinned to the version run locally so CI and developers agree on style.
      - name: Check formatting (Prettier)
        run: npm run format:check

      # shellcheck is preinstalled on ubuntu-latest; shfmt we fetch as a pinned
      # static binary so CI matches what developers run locally. Discover every
      # tracked shell script with git ls-files (mirroring validate.sh) so the
      # ops/ rsync-jail script is linted alongside deploy.sh and validate.sh.
      - name: Lint and format-check shell scripts
        env:
          SHFMT_VERSION: ${{ steps.versions.outputs.shfmt }}
        run: |
          mapfile -t sh_files < <(git ls-files '*.sh')
          shellcheck "${sh_files[@]}"
          curl -sSfL -o "$RUNNER_TEMP/shfmt" \
            "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64"
          chmod +x "$RUNNER_TEMP/shfmt"
          "$RUNNER_TEMP/shfmt" -d "${sh_files[@]}"

      # actionlint validates the workflow itself and runs ShellCheck over the
      # embedded run scripts. Pinned static binary, no repo dependencies.
      - name: Lint workflows (actionlint)
        env:
          ACTIONLINT_VERSION: ${{ steps.versions.outputs.actionlint }}
        run: |
          curl -sSfL -o "$RUNNER_TEMP/actionlint.tar.gz" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf "$RUNNER_TEMP/actionlint.tar.gz" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -color

      # ESLint (the browser modules in js/ and the inline JS in index.html, plus
      # JSON via @eslint/json), stylelint (css/) and markdownlint-cli2, all pinned
      # via package-lock.json.
      - name: Lint JS, JSON, CSS and Markdown
        run: npm run lint

      # Unit tests for the extracted pure logic (the theme cycle and the
      # terminal command replies), via Node's built-in runner — no extra deps.
      # `coverage` runs the same suite with --experimental-test-coverage and
      # fails if the unit-tested surface drops below the pinned thresholds. The
      # two DOM-glue modules are excluded: their paint-dependent half is covered
      # by the Playwright e2e job, which a node-only run can't see.
      - name: Run unit tests and coverage thresholds
        run: npm run coverage

      # Fail if the inline theme guard's sha256 isn't in the CSP (so the policy
      # can't drift), if the og-image isn't the declared 1200x630, if a local
      # asset referenced by the markup/manifest doesn't exist (so a renamed
      # favicon/icon/module can't 404), and if a tracked site file is missing
      # from deploy.sh's DEPLOY_ASSETS (so a new asset can't be silently left out
      # of the deploy).
      - name: Check CSP, og-image, asset refs and deploy set
        run: |
          npm run check:csp
          npm run check:og
          npm run check:asset-refs
          npm run check:deploy-assets

      # svgo keeps every tracked SVG optimised; the check fails if any would
      # change. SVGs are discovered with git ls-files (like the shell-lint step)
      # so a newly added one is checked too. Write to a temp file rather than
      # piping, so a svgo crash (bad fetch, config error) is distinguished from a
      # genuinely unoptimised SVG instead of pipefail turning both into the same
      # misleading message. Mirrors validate.sh.
      - name: Check SVG optimisation
        run: |
          out="$RUNNER_TEMP/svgo-out.svg"
          mapfile -t svg_files < <(git ls-files '*.svg')
          for f in "${svg_files[@]}"; do
            if ! npx svgo --config svgo.config.mjs -i "$f" -o "$out" >/dev/null; then
              echo "svgo failed to process $f"
              exit 1
            fi
            if ! diff -q "$out" "$f" >/dev/null; then
              echo "$f is not optimised; run: npx svgo --config svgo.config.mjs $f"
              exit 1
            fi
          done

  deploy:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Set Node up before writing the deploy key, so no action step runs while
      # the key is on disk. deploy.sh needs node to stamp the timestamp but not
      # SSH, and Configure SSH needs neither, so the order is free to choose.
      # No npm cache: the script only uses node's stdlib, with no install step.
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # Pin the dedicated key to the host and forbid any other identity, so
          # the agent/default keys can't interfere with auth.
          {
            echo "Host http2.core-networks.de"
            echo "  HostName http2.core-networks.de"
            echo "  User web4186"
            echo "  IdentityFile ~/.ssh/id_deploy"
            echo "  IdentitiesOnly yes"
            echo "  UserKnownHostsFile ~/.ssh/known_hosts"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy
        run: ./deploy.sh ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
